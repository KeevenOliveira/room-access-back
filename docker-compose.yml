services:
  postgres:
    image: postgres:16-alpine
    container_name: room_access_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-room_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-room_pass}
      POSTGRES_DB: ${POSTGRES_DB:-room_access}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-room_user} -d ${POSTGRES_DB:-room_access}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
